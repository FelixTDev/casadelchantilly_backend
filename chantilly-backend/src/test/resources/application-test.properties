spring.datasource.url=jdbc:h2:mem:chantilly_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
app.auth.recovery.expose-token=false
jwt.secret=test-secret-key-for-chantilly-application-123456
app.seed.default-admin.enabled=true
app.seed.default-admin.password=Admin123*
spring.flyway.enabled=false
