spring.datasource.url=jdbc:h2:mem:chantilly_ci;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.sql.init.mode=never
app.seed.default-admin.enabled=true
app.seed.default-admin.password=Admin123*
app.seed.catalog.enabled=true
jwt.secret=test-secret-key-for-chantilly-ci-environment-123456
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
spring.flyway.enabled=false
