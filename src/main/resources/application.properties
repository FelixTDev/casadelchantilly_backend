spring.application.name=chantilly
spring.profiles.default=dev
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chantilly_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.MySQLLegacyDialect
server.port=${PORT:8081}
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000
app.auth.cookie.secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.cookie.same-site=${APP_AUTH_COOKIE_SAME_SITE:Lax}
app.csrf.cookie.secure=${APP_CSRF_COOKIE_SECURE:${APP_AUTH_COOKIE_SECURE:false}}
app.csrf.cookie.same-site=${APP_CSRF_COOKIE_SAME_SITE:Lax}
app.auth.recovery.expose-token=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
app.delivery.costo=5.00
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
app.seed.default-admin.enabled=false
app.seed.default-admin.email=${APP_DEFAULT_ADMIN_EMAIL:admin@chantilly.com}
app.seed.default-admin.password=${APP_DEFAULT_ADMIN_PASSWORD:}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
