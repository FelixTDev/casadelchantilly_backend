springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
app.auth.cookie.secure=${APP_AUTH_COOKIE_SECURE:true}
app.auth.cookie.same-site=${APP_AUTH_COOKIE_SAME_SITE:None}
app.csrf.cookie.secure=${APP_CSRF_COOKIE_SECURE:true}
app.csrf.cookie.same-site=${APP_CSRF_COOKIE_SAME_SITE:None}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:${CORS_ALLOWED_ORIGINS:${FRONTEND_URL:https://casadelchantilly-frontend.vercel.app}}}
